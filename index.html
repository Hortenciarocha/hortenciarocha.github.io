
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConectaModa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:auto;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f8f9fc;
color:#222;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:0px 6px;
background:white;
box-shadow:0 2px 15px rgba(0,0,0,0.05);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#8e2de2,#ff6a88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav{
display:flex;
gap:25px;
}

nav a{
text-decoration:none;
color:#555;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

nav a:hover{
color:#8e2de2;
}

/* HERO */
.hero{
padding:50px 60px 20px 60px;
}

.hero h1{
font-size:28px;
margin-bottom:10px;
}

.hero p{
color:#666;
}

.search{
margin-top:20px;
}

.search input{
width:320px;
padding:10px 15px;
border-radius:25px;
border:1px solid #ddd;
outline:none;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:30px 60px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card-content h3{
font-size:18px;
margin-bottom:5px;
}

.store-name{
font-size:13px;
color:#777;
margin-bottom:6px;
}

.price{
font-weight:600;
margin:6px 0;
}

.size{
font-size:13px;
color:#777;
margin-bottom:10px;
}

.actions{
display:flex;
justify-content:space-between;
}

.btn{
border:none;
padding:7px 12px;
border-radius:25px;
cursor:pointer;
font-size:13px;
transition:0.3s;
}

.fav{
background:#ff4757;
color:white;
}

.contact{
background:#25D366;
color:white;
}

.store-btn{
background:#8e2de2;
color:white;
margin-top:10px;
}

.section{
display:none;
}

.active{
display:block;
}

footer{
text-align:center;
padding:25px;
margin-top:40px;
background:#111;
color:white;
}
</style>
</head>

<body>

<header>
<img src="https://hortenciarocha.github.io/logo.png" alt="ConectaModa" width="200">
<nav>
<a onclick="showSection('home')">Início</a>
<a onclick="showSection('stores')">Lojas</a>
<a onclick="showSection('favorites')">Favoritos</a>
</nav>

</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">
<div class="logo">ConectaModa</div>
<h1>Destaques da Cidade</h1>
<p>A vitrine digital que conecta você às melhores lojas da cidade.</p>

<div class="search">
<input type="text" placeholder="Buscar peça ou loja...">
</div>
</div>
<div class="grid" id="highlight"></div>
</div>

<!-- LOJAS -->
<div id="stores" class="section">
<div class="hero">
<h1>Lojas Disponíveis 🏬</h1>
<p>Clique na loja para ver todas as peças.</p>
</div>
<div class="grid" id="storeList"></div>
</div>

<!-- PERFIL LOJA -->
<div id="storeProfile" class="section">
<div class="hero">
<h1 id="storeName"></h1>
<button class="btn store-btn" onclick="showSection('stores')">← Voltar</button>
</div>
<div class="grid" id="storeProducts"></div>
</div>

<!-- FAVORITOS -->
<div id="favorites" class="section">
<div class="hero">
<h1>Peças Salvas ❤️</h1>
</div>
<div class="grid" id="favList"></div>
</div>

<footer>
© 2026 ConectaModa - Desenvolvido por Hortência 
</footer>

<script>

const data = [
{
name:"Bella Moda",
whatsapp:"33 98411",
products:[
{ id:1, name:"Jaqueta Elegance", price:"R$159,90", size:"P, M, G", img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{ id:2, name:"Blusa Charm", price:"R$89,90", size:"M, G", img:"https://i.pinimg.com/736x/04/5d/63/045d637a7372835d9f2fcff9449e4969.jpg"},
{ id:3, name:"Saia Fashion", price:"R$120,00", size:"P, M, G", img:"https://images.tcdn.com.br/img/img_prod/811247/saia_juvenil_de_prega_verde_militar_200163930_1_c4b318b22aa1a1e5516917bbd122cc39.png"},
{ id:4, name:"Vestido Floral", price:"R$179,90", size:"P, M, G", img:"https://ruateresaonline.com.br/media/catalog/product/cache/1/image/650x/040ec09b1e35df139433887a97daa66f/v/e/vestido-mangas-sino-estampa-tapecaria-verde_217072_600_2_1.jpg"},
{ id:5, name:"Cropped Style", price:"R$69,90", size:"P, M", img:"https://cdn.shoppub.io/cdn-cgi/image/w=1000,h=1000,q=80,f=auto/cactus/media/uploads/produtos/foto/masvpxdg/croppe-245103-e-calca-244403.jpg"}
]
},

{
name:"Estilo Urbano",
whatsapp:"5588888888888",
products:[
{ id:6, name:"Blazer Chic", price:"R$229,90", size:"M, G, GG", img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
{ id:7, name:"Jaqueta Jeans", price:"R$199,90", size:"M, G", img:"https://cea.vtexassets.com/arquivos/ids/59215676-800-auto?v=638778394773300000&width=800&height=auto&aspect=true"},
{ id:8, name:"Camiseta Street", price:"R$79,90", size:"P, M, G", img:"https://down-br.img.susercontent.com/file/br-11134207-7r98o-lrhntxau20boc1"},
{ id:9, name:"Moletom Casual", price:"R$149,90", size:"M, G", img:"https://static.topper.com.br/produtos/blusa-moletom-topper-casual-masculina/06/D30-5792-006/D30-5792-006_zoom1.jpg?ts=1695442982&ims=544x"},
{ id:10, name:"Calça Jeans Slim", price:"R$189,90", size:"38, 40, 42", img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"}
]
}
];

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
if(id==="favorites") loadFav();
}

/* GERAR CARDS */
function card(prod,store){
return `
<div class="card">
<img src="${prod.img}">
<div class="card-content">
<h3>${prod.name}</h3>
<p class="store-name">Loja: ${store.name}</p>
<div class="price">${prod.price}</div>
<div class="size">Tamanhos: ${prod.size}</div>
<div class="actions">
<button class="btn fav" onclick='save(${JSON.stringify(prod)})'>❤️</button>
<button class="btn contact" onclick="window.open('https://wa.me/${store.whatsapp}','_blank')">📲</button>
</div>
</div>
</div>
`;
}

/* DESTAQUES */
const highlight=document.getElementById("highlight");
data.forEach(store=>{
store.products.forEach(prod=>{
highlight.innerHTML+=card(prod,store);
});
});

/* LOJAS */
const storeList=document.getElementById("storeList");
data.forEach((store,index)=>{
storeList.innerHTML+=`
<div class="card">
<div class="card-content">
<h3>${store.name}</h3>
<p>Ver todas as peças disponíveis</p>
<button class="btn store-btn" onclick="openStore(${index})">Abrir Loja</button>
</div>
</div>
`;
});

/* ABRIR LOJA */
function openStore(index){
showSection("storeProfile");
document.getElementById("storeName").innerText=data[index].name;
const container=document.getElementById("storeProducts");
container.innerHTML="";
data[index].products.forEach(prod=>{
container.innerHTML+=card(prod,data[index]);
});
}

/* FAVORITOS */
function save(prod){
let fav=JSON.parse(localStorage.getItem("fav"))||[];

if(!fav.find(p=>p.id===prod.id)){
fav.push(prod);
localStorage.setItem("fav",JSON.stringify(fav));
alert("Peça salva ❤️");
}else{
alert("Essa peça já está nos favoritos 😉");
}
}

function loadFav(){
let fav=JSON.parse(localStorage.getItem("fav"))||[];
const container=document.getElementById("favList");
container.innerHTML="";

fav.forEach((prod,index)=>{
container.innerHTML+=`
<div class="card">
<img src="${prod.img}">
<div class="card-content">
<h3>${prod.name}</h3>
<div class="price">${prod.price}</div>
<button class="btn fav" onclick="removeFav(${index})">Remover</button>
</div>
</div>
`;
});
}

function removeFav(index){
let fav=JSON.parse(localStorage.getItem("fav"))||[];
fav.splice(index,1);
localStorage.setItem("fav",JSON.stringify(fav));
loadFav();
}

</script>

</body>
</html>
